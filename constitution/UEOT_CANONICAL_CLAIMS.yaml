claims:
  - id: core-001
    title: Persistent existence requires Omega-loop maintenance
    status: canonical
    statement: >
      A persistently existing UEOT object maintains at least one self-regenerating
      Omega-loop that reproduces the pattern constituting its identity.
  - id: core-002
    title: Objecthood is processual
    status: canonical
    statement: >
      UEOT interprets objects as stabilized processes rather than merely static
      substances.
  - id: core-003
    title: Evolution is governed by Pi/Phi coupling
    status: canonical
    statement: >
      The evolution of every object is shaped by a coupled physical-efficiency
      and informational-optimization dynamic.
  - id: core-004
    title: Teleology is internally emergent
    status: canonical
    statement: >
      Goal-directed behavior arises as the macro-scale consequence of an object's
      own optimization landscape rather than from an external teleological force.
  - id: core-005
    title: GOD and GOA are mandatory explanatory primitives
    status: canonical
    statement: >
      Every serious domain analysis must identify both the local evolutionary
      direction (GOD) and the longer-run attractor (GOA).
  - id: core-006
    title: Lifecycle staging is constitutive
    status: canonical
    statement: >
      Each object analysis must distinguish emergence, maturation/optimization,
      and decay/dissolution phases.
  - id: core-007
    title: Multiscale reasoning is required
    status: canonical
    statement: >
      UEOT explanations must handle sub-object, object, and super-object
      relations where the domain is inherently multiscale.
  - id: method-001
    title: Domain extensions must be falsification-aware
    status: canonical
    statement: >
      Domain agents must produce research-actionable consequences, counterargument
      handling, and evidence targets rather than purely analogical language.
  - id: governance-001
    title: Only architect resolution can modify canon
    status: canonical
    statement: >
      Domain agents may propose changes, but only written architect resolutions can
      alter constitutional doctrine.
